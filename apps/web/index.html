<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <!-- Browser auto-translate (Chrome/Edge) rewrites React-owned text nodes while
         agent responses stream, freezing the visible text and crashing React with
         "NotFoundError: removeChild". The app is localized via i18next, so browser
         translation is disabled document-wide. -->
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/theme/favicon.svg" />
    <link rel="stylesheet" href="/theme/theme.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__APP_TITLE__</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
