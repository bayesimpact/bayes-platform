name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: self-hosted
    steps:
      - name: Clean up Docker artifacts
        run: docker compose -f infra/database/docker-compose.yaml down -v 2>/dev/null || true; sudo rm -rf infra/database/dontsave 2>/dev/null || true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: TEST_WORKERS=5 make tests-parallel