name: Release

on:
  push:
    tags:
      - "v[0-9][0-9].[0-9][0-9].*"

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Extract content between [Unreleased] and the next ## heading
          NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{found=0} found' CHANGELOG.md)

          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            echo "No release notes found in [Unreleased] section" >&2
            exit 1
          fi

          # Write to file for the GitHub Release body
          echo "$NOTES" > release-notes.txt

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Replace [Unreleased] section with versioned heading and a fresh [Unreleased]
          awk -v ver="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              print "## [Unreleased]"
              print ""
              print "### Added"
              print ""
              print "### Changed"
              print ""
              print "### Fixed"
              print ""
              print "### Security"
              print ""
              print "## [" ver "] - " date
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Create changelog PR
        id: changelog_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chore/changelog-v${VERSION}"
          cp CHANGELOG.md /tmp/CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: promote changelog for v${VERSION}"
          git push origin "$BRANCH"
          echo "branch_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: promote changelog for v${VERSION}" \
            --body "Automated changelog update for release v${VERSION}."
          gh pr merge "$BRANCH" --squash --auto

      - name: Approve changelog PR tests check
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'tests',
              head_sha: '${{ steps.changelog_pr.outputs.branch_sha }}',
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Changelog-only PR — skipping tests',
                summary: 'No tests needed for changelog-only changes.'
              }
            });

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.txt
