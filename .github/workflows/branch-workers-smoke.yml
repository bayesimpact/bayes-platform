name: Branch Workers Smoke

on:
  push:
    branches-ignore:
      - main
    paths:
      - "apps/api/**"
      - "infra/**"
      - "Makefile"
  workflow_dispatch:

jobs:
  workers-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run GPU workers startup smoke check
        run: make docker-gpu-workers-check

      - name: Run CPU workers startup smoke check
        run: make docker-cpu-workers-check
