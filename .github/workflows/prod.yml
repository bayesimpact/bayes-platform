name: prod
on:
  push:
    branches:
      - main
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare against pre-push state

      - name: Check for API changes
        id: check
        run: |
          # Compare against the commit before the push (handles multiple commits)
          BASE_REF="${{ github.event.before }}"
          # Fallback to HEAD^1 if before is not available (e.g., first push)
          if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
            BASE_REF="HEAD^1"
          fi

          if make check-api-changes BASE_REF=$BASE_REF; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  tests:
    needs: [check-changes]
    if: needs.check-changes.outputs.deploy == 'true'
    runs-on: self-hosted
    steps:
      - name: Clean up Docker artifacts
        run: docker ps -q | xargs -r docker stop; docker ps -aq | xargs -r docker rm; docker volume prune -f; sudo rm -rf infra/database/dontsave 2>/dev/null || true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: TEST_WORKERS=5 make tests-parallel

      - name: Notify on failure
        if: ${{ failure() }}
        run: make notify-error

  dispatch:
    needs: [check-changes, tests]
    if: ${{ always() && needs.check-changes.result == 'success' && needs.tests.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch to infra repo
        run: |
          gh api repos/${{ github.repository_owner }}/infra/dispatches \
            -f event_type=deploy \
            -f "client_payload[sha]=${{ github.sha }}" \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[deploy_api]=${{ needs.check-changes.outputs.deploy }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Notify on failure
        if: ${{ failure() }}
        run: make notify-error